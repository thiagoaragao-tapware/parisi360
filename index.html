<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PARISI — Warehouse</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --gold: #c9a55a; --gold-light: #e2c07a; --bg: #0d0c0b;
  --border: rgba(201,165,90,0.2); --border-focus: rgba(201,165,90,0.75);
  --text: #f0e8d8; --text-muted: rgba(201,165,90,0.45);
  --green: #7cad6e; --red: #c97070; --radius: 13px;
}
html, body { height:100%; background:var(--bg); font-family:'Montserrat',sans-serif; color:var(--text); overflow-x:hidden; }

/* ══ HOME ══ */
#homeScreen { position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.4s, transform 0.4s; }
.home-bg { position:absolute; inset:0; background:radial-gradient(ellipse at 70% 15%,rgba(180,140,60,.12) 0%,transparent 50%),radial-gradient(ellipse at 20% 80%,rgba(140,110,50,.08) 0%,transparent 45%),linear-gradient(160deg,#1a1610 0%,#0d0c0a 40%,#080807 100%); }
.home-bg::before { content:''; position:absolute; inset:0; background-image:repeating-linear-gradient(90deg,rgba(201,165,90,.03) 0px,rgba(201,165,90,.03) 1px,transparent 1px,transparent 28px); }
.home-content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; width:100%; padding:0 32px; }
.logo-wrap { text-align:center; margin-bottom:44px; }
.logo-main { font-family:'Cormorant Garamond',serif; font-size:clamp(52px,14vw,80px); font-weight:300; letter-spacing:0.22em; color:var(--gold); line-height:1; text-shadow:0 0 60px rgba(201,165,90,.2); }
.logo-sub  { font-size:clamp(9px,2.5vw,11px); font-weight:500; letter-spacing:0.45em; color:rgba(201,165,90,.65); margin-top:8px; text-transform:uppercase; }
.logo-line { width:36px; height:1px; background:var(--gold); margin:10px auto 0; opacity:.5; }
.home-search-wrap { width:100%; max-width:420px; }
.home-search-box { display:flex; align-items:center; border:1.5px solid rgba(201,165,90,.35); border-radius:50px; padding:0 6px 0 20px; height:56px; gap:10px; transition:border-color .2s,box-shadow .2s; }
.home-search-box:focus-within { border-color:var(--border-focus); box-shadow:0 0 28px rgba(201,165,90,.1); }
.home-search-icon { color:var(--gold); flex-shrink:0; opacity:.75; }
.home-divider { width:1px; height:22px; background:rgba(201,165,90,.25); flex-shrink:0; margin:0 2px; }
#homeInput { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'Montserrat',sans-serif; font-size:14px; font-weight:300; letter-spacing:.03em; caret-color:var(--gold); }
#homeInput::placeholder { color:rgba(201,165,90,.4); }
.home-search-btn { width:44px; height:44px; border-radius:50%; background:rgba(201,165,90,.12); border:1px solid rgba(201,165,90,.3); color:var(--gold); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:background .2s; }
.home-search-btn:hover { background:rgba(201,165,90,.25); }

/* ══ AUTOCOMPLETE ══ */
.autocomplete-wrap { position:relative; width:100%; }
.autocomplete-dropdown { position:absolute; top:calc(100% + 8px); left:0; right:0; background:rgba(16,14,11,.99); border:1px solid rgba(201,165,90,.28); border-radius:14px; overflow:hidden; z-index:999; box-shadow:0 16px 48px rgba(0,0,0,.75); display:none; flex-direction:column; max-height:280px; overflow-y:auto; }
.autocomplete-dropdown.open { display:flex; }
.autocomplete-dropdown::-webkit-scrollbar { width:3px; }
.autocomplete-dropdown::-webkit-scrollbar-thumb { background:rgba(201,165,90,.2); border-radius:3px; }
.ac-item { display:flex; align-items:center; gap:10px; padding:11px 16px; cursor:pointer; border-bottom:1px solid rgba(201,165,90,.07); transition:background .1s; min-height:46px; }
.ac-item:last-child { border-bottom:none; }
.ac-item:hover { background:rgba(201,165,90,.08); }
.ac-code { font-size:12px; font-weight:600; color:var(--gold); white-space:nowrap; flex-shrink:0; min-width:80px; }
.ac-code mark { background:rgba(201,165,90,.2); color:var(--gold-light); border-radius:3px; padding:0 1px; font-weight:700; }
.ac-desc { font-size:12px; font-weight:300; color:rgba(240,232,216,.55); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
.ac-loc  { font-size:11px; font-weight:500; color:rgba(201,165,90,.4); white-space:nowrap; flex-shrink:0; }

/* ══ RESULTS ══ */
#resultsScreen { min-height:100vh; display:none; flex-direction:column; background:var(--bg); }
.results-topbar { position:sticky; top:0; z-index:50; background:rgba(13,12,11,.97); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid rgba(201,165,90,.12); padding:12px 16px; }
.results-topbar-inner { display:flex; align-items:center; gap:10px; max-width:640px; margin:0 auto; }
.back-btn { background:none; border:none; color:var(--gold); cursor:pointer; padding:6px; display:flex; align-items:center; flex-shrink:0; opacity:.75; transition:opacity .15s; }
.back-btn:hover { opacity:1; }
.topbar-logo { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:400; letter-spacing:.18em; color:var(--gold); flex-shrink:0; }
.topbar-ac-wrap { position:relative; flex:1; }
.topbar-search { display:flex; align-items:center; background:rgba(201,165,90,.05); border:1px solid rgba(201,165,90,.22); border-radius:50px; padding:0 14px; height:40px; gap:8px; }
#topbarInput { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'Montserrat',sans-serif; font-size:13px; caret-color:var(--gold); }
#topbarInput::placeholder { color:var(--text-muted); }
.topbar-ac-wrap .autocomplete-dropdown { top:calc(100% + 6px); border-radius:12px; }

.results-meta { max-width:640px; margin:0 auto; padding:12px 16px 2px; font-size:10px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:rgba(201,165,90,.35); }
.results-list  { max-width:640px; margin:0 auto; width:100%; padding:4px 16px 80px; display:flex; flex-direction:column; gap:10px; }

/* ══ CARD ══ */
.card { background:rgba(20,18,14,.9); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:0 2px 16px rgba(0,0,0,.3); }
.card-top { display:flex; align-items:center; gap:10px; padding:14px 16px 10px; border-bottom:1px solid rgba(201,165,90,.1); }
.card-code { font-size:12px; font-weight:600; color:var(--gold); background:rgba(201,165,90,.1); border:1px solid rgba(201,165,90,.22); padding:4px 11px; border-radius:20px; white-space:nowrap; flex-shrink:0; letter-spacing:.04em; }
.card-desc { font-size:13px; font-weight:400; color:var(--text); flex:1; min-width:0; letter-spacing:.01em; line-height:1.35; }
.card-desc.no-desc { color:rgba(201,165,90,.3); font-style:italic; font-size:12px; }
.card-body { padding:12px 14px 14px; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.detail-item { background:rgba(201,165,90,.04); border:1px solid rgba(201,165,90,.09); border-radius:10px; padding:10px 12px; }
.detail-item.full { grid-column:1/-1; }
.detail-label { font-size:9px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:rgba(201,165,90,.38); margin-bottom:4px; }
.detail-value { font-size:13px; font-weight:500; color:var(--text); }
.detail-value.location-val { font-size:17px; font-weight:600; color:var(--gold); letter-spacing:.14em; }
.detail-value.stock-pos { color:var(--green); }
.detail-value.stock-zero { color:rgba(201,165,90,.35); }
.detail-value.stock-neg { color:var(--red); }
.detail-value.small { font-size:12px; font-weight:400; line-height:1.4; }
.status-pill { display:inline-block; font-size:10px; font-weight:600; letter-spacing:.06em; padding:3px 10px; border-radius:20px; text-transform:uppercase; }
.s-stocked    { background:rgba(124,173,110,.12); color:var(--green); border:1px solid rgba(124,173,110,.22); }
.s-nonstocked { background:rgba(201,165,90,.1);  color:var(--gold);  border:1px solid rgba(201,165,90,.22); }
.s-superseded { background:rgba(201,112,112,.1); color:var(--red);   border:1px solid rgba(201,112,112,.22); }
.s-unknown    { background:rgba(201,165,90,.05); color:rgba(201,165,90,.4); border:1px solid rgba(201,165,90,.1); }

/* ══ ERROR NOTICE ══ */
.error-notice { max-width:640px; margin:0 auto; width:100%; padding:10px 16px 0; }
.error-notice-inner { border:1px solid rgba(201,165,90,.15); border-radius:10px; padding:10px 14px; display:flex; align-items:center; gap:10px; background:rgba(201,165,90,.04); }
.error-notice-inner p { font-size:11px; font-weight:300; color:rgba(201,165,90,.45); letter-spacing:.02em; line-height:1.5; }
.error-notice-inner p strong { color:rgba(201,165,90,.7); font-weight:600; }

/* ══ EMPTY / WELCOME ══ */
.empty-state { text-align:center; padding:56px 20px; }
.empty-state .ei { font-size:38px; margin-bottom:14px; opacity:.45; }
.empty-state h3 { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; color:var(--gold); margin-bottom:8px; }
.empty-state p  { font-size:13px; color:rgba(201,165,90,.38); font-weight:300; line-height:1.6; }
.welcome-stats { display:flex; justify-content:center; gap:28px; margin-top:28px; }
.ws-num   { display:block; font-size:22px; font-weight:700; color:var(--gold); }
.ws-label { font-size:10px; color:rgba(201,165,90,.38); letter-spacing:.1em; text-transform:uppercase; }

#homeScreen.hidden { opacity:0; pointer-events:none; transform:translateY(-10px); }
#resultsScreen.visible { display:flex; }

@media(min-width:768px){
  .home-bg::before { background-image:repeating-linear-gradient(90deg,rgba(201,165,90,.022) 0px,rgba(201,165,90,.022) 1px,transparent 1px,transparent 40px); }
  .logo-main { font-size:88px; }
}
</style>
</head>

<!-- ══ RESULTS ══ -->

      </button>

          <input id="topbarInput" type="search" placeholder="Search product…" autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <div class="autocomplete-dropdown" id="topbarDropdown"></div>
      </div>
    </div>
  </div>

  <div class="error-notice" id="errorNotice" style="display:none">
    <div class="error-notice-inner">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:rgba(201,165,90,.45);flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>

    </div>
  </div>

  <div class="results-meta" id="resultsMeta"></div>
  <div class="results-list"  id="resultsList"></div>
</div>

are Spares", "status": "Stocked", "stock": "288", "matched": "MATCHED"}];

const index = PRODUCTS.map(p => ({
  ...p,
  _s: (p.code + ' ' + p.description + ' ' + p.category + ' ' + p.location).toLowerCase()
}));

const homeScreen  = document.getElementById('homeScreen');
const resultsScreen = document.getElementById('resultsScreen');
const homeInput   = document.getElementById('homeInput');
const backBtn     = document.getElementById('backBtn');
const topbarInput = document.getElementById('topbarInput');
const resultsList = document.getElementById('resultsList');
const resultsMeta = document.getElementById('resultsMeta');
const errorNotice = document.getElementById('errorNotice');

// ── Navigate ──
function goResults(query) {
  homeScreen.classList.add('hidden');
  resultsScreen.classList.add('visible');
  topbarInput.value = query;
  render(query);
  window.scrollTo(0, 0);
}
function goHome() {
  homeScreen.classList.remove('hidden');
  resultsScreen.classList.remove('visible');
  homeInput.value = topbarInput.value;
  setTimeout(() => homeInput.focus(), 300);
}

homeInput.addEventListener('keydown', e => { if (e.key === 'Enter' && homeInput.value.trim()) goResults(homeInput.value.trim()); });
document.getElementById('homeSearchBtn').addEventListener('click', () => { if (homeInput.value.trim()) goResults(homeInput.value.trim()); });
backBtn.addEventListener('click', goHome);
topbarInput.addEventListener('input', () => render(topbarInput.value.trim()));

// ── Helpers ──
function statusClass(s) {
  if (!s) return 's-unknown';
  const l = s.toLowerCase();
  if (l.includes('superseded')) return 's-superseded';
  if (l === 'stocked')           return 's-stocked';
  if (l.includes('non') || l.includes('not')) return 's-nonstocked';
  return 's-unknown';
}
function stockClass(v) {
  const n = parseInt(v);
  if (isNaN(n)) return '';
  return n > 0 ? 'stock-pos' : n === 0 ? 'stock-zero' : 'stock-neg';
}

// ── Render ──
function render(query) {
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  const matches = terms.length ? index.filter(p => terms.every(t => p._s.includes(t))) : [];

  errorNotice.style.display = matches.length ? 'block' : 'none';

  if (!matches.length) {
    resultsMeta.textContent = '';
    resultsList.innerHTML = `
      <div class="empty-state">
        <div class="ei">✦</div>
        <h3>${query ? 'No products found' : 'Start searching'}</h3>
        <p>${query ? 'Try a different code or description.' : 'Type a product code or name above.'}</p>
        ${!query ? `<div class="welcome-stats">
          <div><span class="ws-num">${PRODUCTS.length}</span><span class="ws-label">Products</span></div>
          <div><span class="ws-num">${new Set(PRODUCTS.map(p=>p.location)).size}</span><span class="ws-label">Locations</span></div>
          <div><span class="ws-num">${PRODUCTS.filter(p=>p.description).length}</span><span class="ws-label">With full info</span></div>
        </div>` : ''}
      </div>`;
    return;
  }

  const q = query.toLowerCase();
  matches.sort((a, b) => {
    const r = p => p.code.toLowerCase() === q ? 0 : p.code.toLowerCase().startsWith(q) ? 1 : 2;
    return r(a) - r(b);
  });

  const shown = matches.slice(0, 100);
  const extra = matches.length > 100 ? ' — showing first 100' : '';
  resultsMeta.textContent = `${matches.length} product${matches.length !== 1 ? 's' : ''} found${extra}`;

  resultsList.innerHTML = shown.map(p => {
    const hasInfo = p.matched === 'MATCHED' && p.description;
    const sCls = statusClass(p.status);
    const stCls = stockClass(p.stock);
    const body = hasInfo ? `
      <div class="detail-grid">
        <div class="detail-item full">
          <div class="detail-label">Shelf Location</div>
          <div class="detail-value location-val">${p.location || '—'}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Stocking Status</div>
          <div class="detail-value"><span class="status-pill ${sCls}">${p.status || '—'}</span></div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Available Stock</div>
          <div class="detail-value ${stCls}">${p.stock !== '' ? p.stock + ' units' : '—'}</div>
        </div>
        ${p.category ? `<div class="detail-item full"><div class="detail-label">Category</div><div class="detail-value small">${p.category}</div></div>` : ''}
      </div>` : `
      <div class="detail-grid">
        <div class="detail-item full">
          <div class="detail-label">Shelf Location</div>
          <div class="detail-value location-val">${p.location || '—'}</div>
        </div>
        <div class="detail-item full">
          <div class="detail-label">Note</div>
          <div class="detail-value small" style="color:rgba(201,165,90,.35)">No additional information available.</div>
        </div>
      </div>`;
    return `<div class="card">
      <div class="card-top">
        <span class="card-code">${p.code}</span>
        <span class="card-desc ${hasInfo ? '' : 'no-desc'}">${hasInfo ? p.description : 'Location only'}</span>
      </div>
      <div class="card-body">${body}</div>
    </div>`;
  }).join('');
}

// ── Autocomplete ──
function getSuggestions(q) {
  if (!q || q.length < 2) return [];
  const ql = q.toLowerCase();
  const terms = ql.split(/\s+/).filter(Boolean);
  const a = [], b = [], c = [];
  for (const p of index) {
    const cl = p.code.toLowerCase();
    if (cl.startsWith(ql))                { a.push(p); continue; }
    if (terms.every(t => cl.includes(t))) { b.push(p); continue; }
    if (terms.every(t => p._s.includes(t))) c.push(p);
  }
  return [...a, ...b, ...c].slice(0, 8);
}
function hl(code, q) {
  const i = code.toLowerCase().indexOf(q.toLowerCase());
  if (i === -1) return code;
  return code.slice(0,i) + '<mark>' + code.slice(i, i+q.length) + '</mark>' + code.slice(i+q.length);
}
function renderDropdown(dd, sugg, q, onSelect) {
  if (!sugg.length) { dd.classList.remove('open'); return; }
  dd.innerHTML = sugg.map((p, i) => `<div class="ac-item" data-i="${i}">
    <span class="ac-code">${hl(p.code, q)}</span>
    <span class="ac-desc">${p.description || '<span style="opacity:.35;font-style:italic">Location only</span>'}</span>
    <span class="ac-loc">${p.location}</span>
  </div>`).join('');
  dd.classList.add('open');
  dd.querySelectorAll('.ac-item').forEach((el, i) => {
    const go = e => { e.preventDefault(); onSelect(sugg[i]); };
    el.addEventListener('mousedown', go);
    el.addEventListener('touchend', go);
  });
}
function closeDropdowns() {
  document.getElementById('homeDropdown').classList.remove('open');
  document.getElementById('topbarDropdown').classList.remove('open');
}

homeInput.addEventListener('input', () => {
  const q = homeInput.value.trim();
  renderDropdown(document.getElementById('homeDropdown'), getSuggestions(q), q, p => { homeInput.value = p.code; closeDropdowns(); goResults(p.code); });
});
homeInput.addEventListener('blur',  () => setTimeout(closeDropdowns, 150));
homeInput.addEventListener('focus', () => {
  const q = homeInput.value.trim();
  if (q.length >= 2) renderDropdown(document.getElementById('homeDropdown'), getSuggestions(q), q, p => { homeInput.value = p.code; closeDropdowns(); goResults(p.code); });
});

topbarInput.addEventListener('input', () => {
  const q = topbarInput.value.trim();
  renderDropdown(document.getElementById('topbarDropdown'), getSuggestions(q), q, p => { topbarInput.value = p.code; closeDropdowns(); render(p.code); });
});
topbarInput.addEventListener('blur',  () => setTimeout(closeDropdowns, 150));
topbarInput.addEventListener('focus', () => {
  const q = topbarInput.value.trim();
  if (q.length >= 2) renderDropdown(document.getElementById('topbarDropdown'), getSuggestions(q), q, p => { topbarInput.value = p.code; closeDropdowns(); render(p.code); });
});

render('');
</script>

<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#070604" />
  <title>PARISI | Product Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section id="home" class="screen home-screen active" aria-label="Pesquisa de produto">
      <div class="ambient-line"></div>
      <div class="hero-art" aria-hidden="true">
        <div class="shower"></div><div class="tap"></div><div class="basin"></div><div class="wall-panel"></div>
      </div>

      <div class="brand-block">
        <h1>PARISI</h1>
        <p>BATHWARE</p>
        <span></span>
      </div>

      <form id="searchForm" class="search-card" autocomplete="off">
        <label class="sr-only" for="searchInput">Digite o código do produto</label>
        <svg class="icon" viewBox="0 0 24 24" fill="none"><path d="m21 21-4.35-4.35M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input id="searchInput" inputmode="search" placeholder="Digite o código do produto" />
        <button aria-label="Pesquisar" type="submit">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 12h15m-6-6 6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>

      <div id="suggestions" class="suggestions" hidden></div>
      <p id="loadStatus" class="load-status">Carregando planilha...</p>
    </section>

    <section id="result" class="screen result-screen" aria-label="Informações do produto">
      <header class="result-header">
        <button id="backButton" class="ghost-button" type="button" aria-label="Voltar">
          <svg viewBox="0 0 24 24" fill="none"><path d="M15 18 9 12l6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Voltar
        </button>
        <div><p>PARISI</p><span>PRODUCT DETAILS</span></div>
      </header>

      <article class="product-panel">
        <div class="status-row"><span id="stockBadge" class="badge">Stock</span><span id="resultCategory"></span></div>
        <h2 id="resultCode">—</h2>
        <p id="resultDescription" class="description">—</p>

        <section class="location-highlight">
          <span>LOCATION / SHELF</span>
          <strong id="resultLocation">—</strong>
        </section>

        <div class="grid-info">
          <div><span>Available</span><strong id="availableStock">—</strong></div>
          <div><span>Stock Level</span><strong id="stockLevel">—</strong></div>
          <div><span>Unallocated</span><strong id="unallocatedStock">—</strong></div>
          <div><span>Outstanding S/O</span><strong id="outstandingSO">—</strong></div>
          <div><span>Components</span><strong id="components">—</strong></div>
          <div><span>Status</span><strong id="stockingStatus">—</strong></div>
        </div>
      </article>

      <form id="resultSearchForm" class="mini-search" autocomplete="off">
        <input id="resultSearchInput" placeholder="Pesquisar outro código" />
        <button type="submit">Search</button>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
